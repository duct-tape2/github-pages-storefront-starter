name: Buy Storefront Starter Kit
description: Ask for delivery help or public-safe support after buying the $19 kit.
title: "[BUY] Storefront Starter - "
labels: ["buyer-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in GitHub Pages Storefront Starter.

        Checkout confirmation: https://github.com/duct-tape2/duct-tape2/issues/new?template=paid-inquiry.yml

        Payment acceptance is temporarily paused. Confirm a working checkout before paying. Delivery begins only after confirmed payment; email sks7178@gmail.com for private payment or delivery details.

        Use this public issue only for public-safe support details. Do not post payment records, screenshots, passwords, API keys, private files, customer data, or private URLs.

  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - GitHub Pages Storefront Starter - $19
        - Storefront Review - request first ($49)
        - Repo-to-Revenue Setup - $99
        - Not sure yet
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: What do you need?
      options:
        - Storefront download or delivery problem
        - Review request before payment
        - Pre-purchase question
        - Download or ZIP problem
        - Refund or support question
    validations:
      required: true

  - type: input
    id: payment_confirmation
    attributes:
      label: Public-safe problem summary
      description: Describe the checkout or delivery problem without posting receipt numbers, screenshots, or payment details.
      placeholder: "Checkout failed / delivery email missing / ZIP will not open"
    validations:
      required: true

  - type: input
    id: delivery_contact
    attributes:
      label: Private support email sent?
      description: GitHub issues are public. Write "sent" if you emailed support details; do not post your email address here.
      placeholder: "sent / not needed"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Public-safe notes
      description: Optional support details. Keep private files and customer data out of public issues.
      placeholder: "Storefront delivery failed, or I need help opening the ZIP."
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirm
      options:
        - label: I understand I must confirm a working checkout before paying and that delivery begins only after confirmed payment.
          required: true
